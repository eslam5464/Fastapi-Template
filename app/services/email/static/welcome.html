<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body style="margin: 0; padding: 40px 0; background: #f4f4f5; font-family: Arial, Helvetica, sans-serif">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="560"
            cellpadding="0"
            cellspacing="0"
            style="background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07); padding: 48px 40px"
          >
            <tr>
              <td>
                <h2 style="margin: 0 0 8px; font-size: 22px; color: #111">Welcome to Evolve!</h2>
                <p style="margin: 0 0 20px; color: #555; font-size: 15px">Hi {{first_name}},</p>
                <p style="margin: 0 0 28px; color: #555; font-size: 15px">
                  Your account has been created successfully. We&#39;re excited to have you on board!
                </p>
                <p style="margin: 0; color: #999; font-size: 13px">
                  If you did not create this account, please contact our support team immediately.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
